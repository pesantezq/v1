# Institutional Intelligence — manager registry
#
# Version-controlled, point-in-time-versionable metadata for the bounded set of
# institutional managers whose SEC Form 13F disclosures the subsystem tracks.
#
# HONESTY / SAFETY NOTES:
#   * This registry ships INERT. Every manager is `enabled: false` with
#     `cik_verified: false`. A manager may only be enabled AFTER an operator
#     verifies its CIK against EDGAR (https://www.sec.gov/cgi-bin/browse-edgar).
#     Validation refuses `enabled: true` unless `cik_verified: true`.
#   * The `cik` values below are PLACEHOLDERS (0000000xxx) — they are NOT real
#     CIKs and must be replaced with verified values before enabling. The one
#     exception is `situational_awareness`, whose CIK was supplied in the spec
#     but is still marked unverified until an operator confirms it.
#   * `cloneability` and `manager_quality_prior` are documented SUBJECTIVE
#     PRIORS (inputs to scoring), not claimed facts. Rationale is recorded per
#     manager. Managers are included to span distinct ARCHETYPES, never because
#     a name is famous.
#   * Do not infer net direction from reported options without contextual
#     evidence (see the options-interpretation taxonomy).

schema_version: 1

managers:
  situational_awareness:
    display_name: Situational Awareness LP
    cik: "0002045724"           # from spec; operator must verify before enabling
    enabled: false
    cik_verified: false
    strategy_archetype: thematic_ai_infrastructure
    expected_horizon: medium_long
    concentration_style: concentrated
    turnover_class: moderate
    cloneability: 0.65
    manager_quality_prior: 0.70
    options_complexity: high
    market_maker: false
    specialization:
      - ai_compute
      - semiconductors
      - memory
      - datacenters
      - power_infrastructure
    effective_from: "2025-01-01"
    effective_to: null
    rationale: >-
      Concentrated thematic AI-infrastructure archetype. High options
      complexity means reported puts/calls may form sector-beta hedges around
      concentrated longs — never inferred as directional. Cloneability prior
      moderate-high because the equity longs are large and identifiable.
    notes:
      - Do not infer net direction from reported options without contextual evidence.

