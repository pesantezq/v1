{# Pass via `with`: label, value, optional caption. #}
<div class="bg-zinc-900 rounded-lg border border-zinc-800 p-6 space-y-2">
  <div class="text-xs uppercase tracking-wide text-zinc-400">{{ label }}</div>
  <div class="text-3xl font-mono font-semibold">{{ value }}</div>
  {% if caption %}
  <div class="text-xs text-zinc-500">{{ caption }}</div>
  {% endif %}
</div>
