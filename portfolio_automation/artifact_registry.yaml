  # ── Broker sync (Schwab, read-only) ───────────────────────────────────────
  # Observe-only broker layer. broker_sync_status is always-producible (emits
  # status=unconfigured until credentials are set, so it is never legitimately
  # absent once the layer ships) and is refreshed by the daily cron stage
  # (run_daily_safe.sh "Schwab broker sync") → cadence:daily. The other four
  # exist only after a live authenticated `schwab_sync --sync/--reconcile` run,
  # so they read info-missing (not a fault) until Schwab is authenticated and
  # STAY cadence:on_demand → daily cadence would manufacture false-stale flags
  # while unconfigured or on a failed sync.
  broker_sync_status.json:
    path: outputs/latest/broker_sync_status.json
    label: broker sync status
    lens: developer
    role: telemetry
    required: false
    cadence: daily
    producer: schwab_sync
