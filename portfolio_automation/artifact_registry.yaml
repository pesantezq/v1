    severity_if_missing: info
    consumer_status: consumed
    notes: "Schwab read-only broker sync health. Always-producible; status=unconfigured until SCHWAB_* env + OAuth token set. Refreshed daily by run_daily_safe.sh (non-blocking) + re-triggerable on-demand (CLI/GUI)."

