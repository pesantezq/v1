  decision_plan.json:
    path: outputs/latest/decision_plan.json
    label: decision plan
    lens: decision_core
    role: source_of_truth
    required: true
    cadence: daily
    producer: decision_engine
    consumers: [daily-tool-analysis, portfolio-memo-reviewer, portfolio-resolver-investigator, portfolio-architect]
    severity_if_missing: critical
    consumer_status: consumed

