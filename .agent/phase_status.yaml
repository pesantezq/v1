# ---------------------------------------------------------------------------
# Post-Phase-0 Roadmap (not started unless noted)
# ---------------------------------------------------------------------------

post_phase_0:
  confidence_calibration_feedback_loop:
    status: complete
    priority: high
    description: Enhanced confidence calibration feedback loop with stable 5-bucket LATEST artifact output and per-signal analysis
    gate: requires 20 resolved decisions (calibration is already gated at 20)
    prerequisite: phase_0_complete
    files:
      - portfolio_automation/confidence_calibration.py
      - tests/test_pa_confidence_calibration.py
      - docs/CONFIDENCE_CALIBRATION.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
    tests: 72 passing

  run_mode_governance_operating_mode_separation:
    status: complete
    priority: high
    description: Two-lane run-mode governance with 6 canonical modes, namespace permission enforcement, and approval gates
    prerequisite: confidence_calibration_feedback_loop_complete
    files:
      - portfolio_automation/run_mode_governance.py
      - tests/test_run_mode_governance.py
      - docs/RUN_MODE_GOVERNANCE.md
      - docs/ARCHITECTURE.md
      - docs/roadmap.md
    tests: 132 passed

  discovery_engine_foundation:
    status: complete
    priority: medium
    description: Sandbox-only ticker extraction, event classification, candidate scoring, memory, and sandbox report writing
    files:
      - portfolio_automation/discovery/__init__.py
      - portfolio_automation/discovery/news_ticker_discovery.py
      - portfolio_automation/discovery/event_classifier.py
      - portfolio_automation/discovery/candidate_promotion_engine.py
      - portfolio_automation/discovery/discovery_memory.py
      - portfolio_automation/discovery/discovery_reports.py
      - tests/discovery/__init__.py
      - tests/discovery/test_news_ticker_discovery.py
      - tests/discovery/test_event_classifier.py
      - tests/discovery/test_candidate_promotion_engine.py
      - tests/discovery/test_discovery_memory.py
      - tests/discovery/test_discovery_reports.py
      - docs/DISCOVERY_ENGINE.md
    tests: 171 passed
    pending_sub_steps:
      - discovery_corroboration_implementation
      - gui_discovery_approval_workflow
      - daily_memo_discovery_section
      - historical_replay_backtest_for_discovery_candidates

  gui_data_quality_and_ai_budget_panels:
    status: complete
    priority: medium
    description: Read-only GUI panels for Data Quality, AI Budget, Confidence Calibration (latest), and Discovery Sandbox; 4 loaders in gui_operator_data.py; 4 tabs in gui/app.py
    files: [gui_operator_data.py, gui/app.py, tests/test_gui_system_health_panels.py]
    tests: 66 passed
    prerequisite: phase_0_complete

  instrument_ai_call_sites:
    status: complete
    priority: low
    description: >
      Instrumented _try_llm_enhance in ai_decision_validator.py. decision_explainer.py
      has no LLM calls (deterministic). Token counts estimated from text length
      (usage_source=estimated_from_length). Non-blocking via _record_validator_event.
    prerequisite: ai_cost_budget_wrapper_complete
    files:
      - portfolio_automation/ai_decision_validator.py
      - tests/test_ai_decision_validator.py
      - docs/AI_BUDGET.md
      - docs/roadmap.md
    tests: 79 passed (17 new in TestAiBudgetInstrumentation)

# ---------------------------------------------------------------------------
# Permanently deferred (out of scope)
# ---------------------------------------------------------------------------

permanently_deferred:
  auto_trading:
    status: out_of_scope
    reason: System is advisory-only; auto-trading violates core constraint
  broker_api_integration:
    status: out_of_scope
    reason: Same as auto_trading
  billing:
    status: out_of_scope
    reason: Single-operator system; no customer billing model
  multi_tenant_auth:
    status: out_of_scope
    reason: Single-user system; user_id migration is foundation only
  redis_event_bus:
    status: out_of_scope
    reason: Not required for current architecture; adds operational complexity
  full_discovery_promotion_engine:
    status: deferred
    reason: Discovery signals exist but promotion to actionable candidates requires calibration foundation first
  external_customer_productization:
    status: out_of_scope
    reason: Personal system; no external product plans
