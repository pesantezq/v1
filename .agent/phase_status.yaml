# ---------------------------------------------------------------------------
# Phase 0 — Infrastructure & Data Governance
# ---------------------------------------------------------------------------

phase_0:
  name: Infrastructure and Data Governance
  status: complete
  steps:
    user_id_schema_migration:
      status: complete
      description: user_id TEXT NOT NULL DEFAULT 'owner' added to run_history and snapshots
      files: [portfolio_automation/migrations/001_add_user_id.py]
    data_governance_namespacing:
      status: complete
      description: OutputNamespace enum, safe_write_json, safe_write_text, validate_output_path
      files: [portfolio_automation/data_governance.py, docs/DATA_GOVERNANCE.md]
    historical_replay_namespace_enforcement:
      status: complete
      description: replay_reports.py and replay_runner.py use safe_write_json with HISTORICAL namespace
      files: [portfolio_automation/historical_replay/replay_reports.py, portfolio_automation/historical_replay/replay_runner.py]
    signal_registry:
      status: complete
      description: Config-driven signal catalog in YAML with governance rules enforced at load time
      files: [config/signal_registry.yaml, portfolio_automation/signal_registry.py, tests/test_signal_registry.py, docs/SIGNAL_REGISTRY.md]
      tests: 56 passed
    data_quality_monitor:
      status: complete
      description: Observe-only 13-issue-type data quality layer writing to LATEST namespace
      files: [portfolio_automation/data_quality_monitor.py, tests/test_data_quality_monitor.py, docs/DATA_QUALITY_MONITOR.md]
      tests: 87 passed
    ai_cost_budget_wrapper:
      status: complete
      description: AI usage tracking, cost estimation, POLICY event log, LATEST summary artifacts
      files: [portfolio_automation/ai_budget.py, tests/test_ai_budget.py, docs/AI_BUDGET.md]
      tests: 62 passed

