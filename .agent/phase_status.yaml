# ---------------------------------------------------------------------------
# Post-Phase-0 Roadmap (not started unless noted)
# ---------------------------------------------------------------------------

post_phase_0:
  confidence_calibration_feedback_loop:
    status: complete
    priority: high
    description: Enhanced confidence calibration feedback loop with stable 5-bucket LATEST artifact output and per-signal analysis
    gate: requires 20 resolved decisions (calibration is already gated at 20)
    prerequisite: phase_0_complete
    files:
      - portfolio_automation/confidence_calibration.py
      - tests/test_pa_confidence_calibration.py
      - docs/CONFIDENCE_CALIBRATION.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
    tests: 72 passing

  run_mode_governance_operating_mode_separation:
    status: complete
    priority: high
    description: Two-lane run-mode governance with 6 canonical modes, namespace permission enforcement, and approval gates
    prerequisite: confidence_calibration_feedback_loop_complete
    files:
      - portfolio_automation/run_mode_governance.py
      - tests/test_run_mode_governance.py
      - docs/RUN_MODE_GOVERNANCE.md
      - docs/ARCHITECTURE.md
      - docs/roadmap.md
    tests: 132 passed

  discovery_engine_foundation:
    status: complete
    priority: medium
    description: Sandbox-only ticker extraction, event classification, candidate scoring, memory, and sandbox report writing
    files:
      - portfolio_automation/discovery/__init__.py
      - portfolio_automation/discovery/news_ticker_discovery.py
      - portfolio_automation/discovery/event_classifier.py
      - portfolio_automation/discovery/candidate_promotion_engine.py
      - portfolio_automation/discovery/discovery_memory.py
      - portfolio_automation/discovery/discovery_reports.py
      - tests/discovery/__init__.py
      - tests/discovery/test_news_ticker_discovery.py
      - tests/discovery/test_event_classifier.py
      - tests/discovery/test_candidate_promotion_engine.py
      - tests/discovery/test_discovery_memory.py
      - tests/discovery/test_discovery_reports.py
      - docs/DISCOVERY_ENGINE.md
    tests: 171 passed

  historical_replay_backtest_for_discovery_candidates:
    status: complete
    priority: medium
    description: >
      Sandbox-only replay evaluation framework. discovery_replay.py module with
      five public functions: run_discovery_replay, load_discovery_replay_inputs,
      evaluate_discovery_candidate_outcomes, summarize_discovery_replay_results,
      write_discovery_replay_report. Accepts injected price/outcome data (no
      external API calls). Aggregates by status, corroboration, approval decision,
      risk. Writes replay_results.json, replay_results.md,
      replay_candidate_outcomes.jsonl to outputs/sandbox/discovery/.
      Run mode governance: DISCOVERY and BACKTEST only.
    files:
      - portfolio_automation/discovery/discovery_replay.py
      - portfolio_automation/discovery/__init__.py
      - tests/discovery/test_discovery_replay.py
      - docs/DISCOVERY_ENGINE.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
    tests: 79 new (405 total in tests/discovery/)

  email_memo_sender_delivery_track:
    status: complete
    priority: high
    description: >
      Safe, opt-in email delivery for existing daily memo outputs.
      Disabled by default (MEMO_EMAIL_ENABLED=0). Dry-run mode.
      Idempotency via delivery log. No scoring/allocation/recommendation/
      portfolio/watchlist changes. No AI/LLM or market-data API calls.
      Password never logged. observe_only=true, no_trade=true hardcoded.
    files:
      - portfolio_automation/memo_email_sender.py
      - tests/test_memo_email_sender.py
      - watchlist_scanner/daily_memo.py (non-blocking integration)
      - main.py (non-blocking integration)
      - gui_operator_data.py (loader + dashboard key)
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/PIPELINE_RUNBOOK.md
      - docs/roadmap.md
    tests: 81 new (tests/test_memo_email_sender.py)

  fmp_news_intelligence_layer:
    status: complete
    priority: high
    description: >
      Observe-only rules-first FMP news intelligence layer. Normalizes articles,
      deduplicates, extracts entities via alias map/cashtag/parenthetical,
      classifies 16 themes by keyword scoring, builds evidence packets with
      official_monitoring and sandbox_discovery_research lanes, writes to
      LATEST and SANDBOX namespaces. No BUY/SELL/HOLD, no official state mutation.
    prerequisite: email_memo_sender_delivery_track_complete
    files:
      - portfolio_automation/news/__init__.py
      - portfolio_automation/news/fmp_news_intelligence.py
      - tests/test_fmp_news_intelligence.py
      - docs/NEWS_INTELLIGENCE.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
      - .agent/project_state.yaml
      - .agent/phase_status.yaml
    tests: 91 passed

  discovery_news_integration:
    status: complete
    priority: high
    description: >
      Sandbox-only enrichment of discovery candidates with FMP news evidence.
      Matches by ticker, aggregates themes/flags, computes news_relevance_score
      and news_context. Adds news-only tickers. Only DISCOVERY/BACKTEST modes
      may write. No official state mutation, no promotion, no BUY/SELL outputs.
    prerequisite: fmp_news_intelligence_layer_complete
    files:
      - portfolio_automation/discovery/news_integration.py
      - portfolio_automation/discovery/__init__.py
      - tests/discovery/test_news_integration.py
      - docs/DISCOVERY_NEWS_INTEGRATION.md
      - docs/roadmap.md
      - .agent/project_state.yaml
      - .agent/phase_status.yaml
    tests: 72 passed

  daily_weekly_monthly_ai_market_narratives:
    status: complete
    priority: medium
    description: >
      Observe-only market narrative layer. Turns existing structured artifacts
      into daily/weekly/monthly operator narratives. Includes safety validator
      for prohibited instruction patterns, discovery context (sandbox-only),
      and all six narrative artifacts to LATEST namespace. AI support deferred;
      all generation is deterministic. No official state mutation.
    prerequisite: discovery_news_integration_complete
    files:
      - portfolio_automation/market_narratives.py
      - tests/test_market_narratives.py
      - docs/MARKET_NARRATIVES.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
      - .agent/project_state.yaml
      - .agent/phase_status.yaml
    tests: 79 passed

  news_evidence_layer_for_decision_engine:
    status: complete
    priority: high
    description: >
      Capped, observe-only layer that converts news/narrative/discovery evidence
      into decision-engine-adjacent context.  Hard influence cap "context_only".
      Cannot override decisions, scoring, allocation, recommendations, or
      watchlists.  Per-ticker evidence_strength + context_effect classification.
      Codex boundary hardening: DecisionNewsContext schema reframed to drop
      decision_action / decision_reason; emits only upstream_decision_present
      (bool) + upstream_decision_context (neutral enum).  Validator + sanitizer
      now detect whole-word standalone action tokens
      (BUY/SELL/HOLD/ACTIONABLE/PROMOTED/VALIDATED) in addition to multi-word
      instruction phrases.  Pre-write validation blocks unsafe artifact writes.
    prerequisite: daily_weekly_monthly_ai_market_narratives_complete
    files:
      - portfolio_automation/news_evidence_layer.py
      - tests/test_news_evidence_layer.py
      - docs/NEWS_EVIDENCE_LAYER.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
      - .agent/project_state.yaml
      - .agent/phase_status.yaml
    tests: 104 passed (74 original + 30 Codex boundary hardening)

  automatic_promotion_governance_layer:
    status: complete
    priority: high
    description: >
      Replaces the previously planned manual_promotion_proposal step.
      Deterministic, observe-only, sandbox-only governance layer that
      automatically evaluates sandbox discovery candidates against explicit
      gates and graduates qualified candidates to MONITOR state (or to
      NEEDS_REVIEW, REJECTED, or EXPIRED).  Never emits BUY/SELL/HOLD/
      ACTIONABLE/PROMOTED/VALIDATED/APPROVED/TRADE/RECOMMENDATION.  Writes
      three sandbox artifacts: automatic_promotion_candidates.json,
      automatic_promotion_decisions.jsonl (append-only audit log),
      automatic_promotion_summary.md.  Run-mode governance: only DISCOVERY
      and BACKTEST may write.  Three-layer sanitization (label / payload /
      pre-write validation) blocks unsafe artifact writes.
    prerequisite: news_evidence_layer_for_decision_engine_complete
    files:
      - portfolio_automation/discovery/automatic_promotion_governance.py
      - portfolio_automation/discovery/__init__.py
      - tests/discovery/test_automatic_promotion_governance.py
      - docs/AUTOMATIC_PROMOTION_GOVERNANCE.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
      - .agent/project_state.yaml
      - .agent/phase_status.yaml
    tests: 68 passed
    review_status: Codex-reviewed and VPS validated; no blocking implementation issues.
    next_step_note: >
      Roadmap execution is now awaiting the next approved step selection by
      the user/GPT from the next roadmap options.

  gui_operator_cockpit_redesign:
    status: in_progress
    priority: medium
    description: >
      UI/UX layer overhaul of the Streamlit Operator Cockpit (gui/app.py).
      Read-only, card-based, beginner-friendly, with expandable technical
      details.  No portfolio/discovery/scoring/allocation/recommendation/
      decision-engine/automatic-promotion-governance behavior changes.  No
      broker/API or auto-trading.  No LLM/AI calls.
    slices:
      gui_automatic_promotion_review_panel:
        status: complete
        files:
          - gui_operator_data.py
          - gui/app.py
          - tests/test_gui_automatic_promotion.py
          - docs/GUI_OPERATOR_COCKPIT.md
        tests: 31 passed
      dashboard_landing_card_refresh:
        status: complete
        description: >
          Added _render_cockpit_summary_grid() to gui/app.py and invoked it
          at the top of page_dashboard().  Added load_news_evidence_layer
          and load_market_narrative_daily loaders.  8-card grid: Portfolio
          Status, Today's Market Narrative, Decision Plan, Data Quality,
          News Evidence, Automatic Promotion, Memo Delivery, Safety
          Boundary.  Additive only — existing dashboard widgets unchanged.
        files:
          - gui_operator_data.py
          - gui/app.py
          - tests/test_gui_cockpit_summary.py
          - docs/GUI_OPERATOR_COCKPIT.md
          - docs/roadmap.md
          - .agent/project_state.yaml
          - .agent/phase_status.yaml
        tests: 19 passed
    follow_up_slices:
      - news_evidence_layer_panel
      - market_narrative_panel
      - unified_discovery_sandbox_panel

  manual_promotion_proposal:
    status: superseded_by_automatic_promotion_governance_layer
    priority: low
    description: >
      Superseded by automatic_promotion_governance_layer.  Retained here
      only as a historical reference.  If a future operator-driven UI
      workflow is desired, it should build on top of the sandbox
      automatic_promotion artifacts rather than replacing them.
    prerequisite: news_evidence_layer_for_decision_engine_complete
    files: []
    tests: not_applicable

  discovery_corroboration_implementation:
    status: complete
    priority: high
    description: >
      Deterministic corroboration scoring layer. New corroboration.py module with weighted
      formula (source 35%, mention 20%, event 25%, persistence 20%, risk -0.20).
      WATCH status now requires corroboration_met=True (score >= 0.65).
      Persistence data from DiscoveryMemory threads into evaluate_candidates.
    files:
      - portfolio_automation/discovery/corroboration.py
      - portfolio_automation/discovery/candidate_promotion_engine.py
      - portfolio_automation/discovery/discovery_reports.py
      - portfolio_automation/discovery/__init__.py
      - tests/discovery/test_corroboration.py
      - tests/discovery/test_candidate_promotion_engine.py
      - docs/DISCOVERY_ENGINE.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
    tests: 235 passed (58 new in test_corroboration.py; 6 added in Codex hardening)

  daily_memo_discovery_section:
    status: complete
    priority: high
    description: >
      Non-blocking Discovery Research section appended to daily memo (txt + md).
      Reads sandbox-only artifacts: emerging_candidates.json, rejected_candidates.json,
      discovery_memory.json, approval_decisions.jsonl. Validates approval records via
      is_valid_loaded_approval_record(). Clear sandbox-only disclaimer; no BUY/SELL
      language; missing/malformed files handled gracefully. 57 new tests.
    files:
      - watchlist_scanner/daily_memo.py
      - tests/test_daily_memo.py
      - docs/DISCOVERY_ENGINE.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
    tests: 57 new (115 total in test_daily_memo.py)

  gui_discovery_approval_workflow:
    status: complete
    priority: high
    description: >
      Sandbox-only operator approval/audit layer. approval_workflow.py module with
      ApprovalDecision enum (4 values, no buy/sell), DiscoveryApprovalDecision dataclass,
      append-only JSONL artifact (approval_decisions.jsonl), GUI review section in
      _render_discovery_sandbox_tab, loaders in gui_operator_data.py.
      Codex hardening: is_valid_loaded_approval_record() filters tampered JSONL on read;
      rejected candidates loaded from runtime "candidates" key; available flag includes
      approval decisions so summary renders independently of candidate artifacts.
    files:
      - portfolio_automation/discovery/approval_workflow.py
      - portfolio_automation/discovery/__init__.py
      - gui_operator_data.py
      - gui/app.py
      - tests/discovery/test_approval_workflow.py
      - tests/test_gui_discovery_approval.py
      - docs/DISCOVERY_ENGINE.md
      - docs/OUTPUT_ARTIFACT_CONTRACTS.md
      - docs/roadmap.md
    tests: 91 new (66 approval_workflow + 25 gui_discovery_approval); Codex patch adds ~15 more

  gui_data_quality_and_ai_budget_panels:
    status: complete
    priority: medium
    description: Read-only GUI panels for Data Quality, AI Budget, Confidence Calibration (latest), and Discovery Sandbox; 4 loaders in gui_operator_data.py; 4 tabs in gui/app.py
    files: [gui_operator_data.py, gui/app.py, tests/test_gui_system_health_panels.py]
    tests: 66 passed
    prerequisite: phase_0_complete

  instrument_ai_call_sites:
    status: complete
    priority: low
    description: >
      Instrumented _try_llm_enhance in ai_decision_validator.py. decision_explainer.py
      has no LLM calls (deterministic). Token counts estimated from text length
      (usage_source=estimated_from_length). Non-blocking via _record_validator_event.
    prerequisite: ai_cost_budget_wrapper_complete
    files:
      - portfolio_automation/ai_decision_validator.py
      - tests/test_ai_decision_validator.py
      - docs/AI_BUDGET.md
      - docs/roadmap.md
    tests: 79 passed (17 new in TestAiBudgetInstrumentation)

# ---------------------------------------------------------------------------
# Permanently deferred (out of scope)
# ---------------------------------------------------------------------------

permanently_deferred:
  auto_trading:
    status: out_of_scope
    reason: System is advisory-only; auto-trading violates core constraint
  broker_api_integration:
    status: out_of_scope
    reason: Same as auto_trading
  billing:
    status: out_of_scope
    reason: Single-operator system; no customer billing model
  multi_tenant_auth:
    status: out_of_scope
    reason: Single-user system; user_id migration is foundation only
  redis_event_bus:
    status: out_of_scope
    reason: Not required for current architecture; adds operational complexity
  full_discovery_promotion_engine:
    status: deferred
    reason: Discovery signals exist but promotion to actionable candidates requires calibration foundation first
  external_customer_productization:
    status: out_of_scope
    reason: Personal system; no external product plans
