# ---------------------------------------------------------------------------
# Post-Phase-0 Roadmap (not started unless noted)
# ---------------------------------------------------------------------------

post_phase_0:
  confidence_calibration_feedback_loop:
    status: not_started
    priority: high
    description: Wire resolved AI decision validation outcomes into calibration data; tune signal confidence floors after evidence accumulates
    gate: requires 20 resolved decisions (calibration is already gated at 20)
    prerequisite: phase_0_complete

  discovery_engine_foundation:
    status: not_started
    priority: medium
    description: Define discovery pipeline consuming discovery_only signals; route corroboration step before signals become actionable
    note: DO NOT START until confidence_calibration_feedback_loop is complete or explicitly prioritized
    warning: PREMATURE_DISCOVERY_IS_FORBIDDEN — do not begin implementation without explicit user approval

  gui_data_quality_and_ai_budget_panels:
    status: not_started
    priority: medium
    description: Read-only GUI cards consuming data_quality_report.json and ai_budget_summary.json
    prerequisite: phase_0_complete

  instrument_ai_call_sites:
    status: not_started
    priority: low
    description: Add record_ai_usage_event calls in decision_explainer.py and ai_decision_validator.py using real token counts from API responses
    prerequisite: ai_cost_budget_wrapper_complete

# ---------------------------------------------------------------------------
# Permanently deferred (out of scope)
# ---------------------------------------------------------------------------

permanently_deferred:
  auto_trading:
    status: out_of_scope
    reason: System is advisory-only; auto-trading violates core constraint
  broker_api_integration:
    status: out_of_scope
    reason: Same as auto_trading
  billing:
    status: out_of_scope
    reason: Single-operator system; no customer billing model
  multi_tenant_auth:
    status: out_of_scope
    reason: Single-user system; user_id migration is foundation only
  redis_event_bus:
    status: out_of_scope
    reason: Not required for current architecture; adds operational complexity
  full_discovery_promotion_engine:
    status: deferred
    reason: Discovery signals exist but promotion to actionable candidates requires calibration foundation first
  external_customer_productization:
    status: out_of_scope
    reason: Personal system; no external product plans
