    modes: [daily, manual_update, weekly_review]
    description: Produces authoritative portfolio artifacts
    allowed_namespaces: [latest, policy, portfolio, user]
  research_lane:
    modes: [discovery, backtest, historical_replay]
    description: Sandbox/simulation only — never official artifacts
    allowed_namespaces: [sandbox, historical/backtest]
  invariants:
    - can_execute_trades_is_always_false
    - manual_update_requires_approved_true_for_state_mutations
    - discovery_cannot_write_latest_or_emit_recommendations
